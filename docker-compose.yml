
version: '3.8'

services:
  backend:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - ENVIRONMENT=production
    networks:
      - ai-finance-net

  frontend:
    build: .
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - BACKEND_HOST=backend
      - BACKEND_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - ai-finance-net

networks:
  ai-finance-net:
    driver: bridge
